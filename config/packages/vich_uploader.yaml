vich_uploader:
    db_driver: orm

    mappings:
        culture_files:
            uri_prefix: /uploads/cultures
            upload_destination: '%kernel.project_dir%/public/uploads/cultures'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_update: true
            delete_on_remove: true
